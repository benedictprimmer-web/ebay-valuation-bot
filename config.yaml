# valbot config — every tunable in one place.
# Placeholders per CONTEXT.md / ADRs. Calibrate from logged outcomes, don't trust blind.
# Rates confirmed against eBay UK live calculator on 2026-06-16 (see README "Fee model").
#
# STRUCTURE: the blocks below are NEUTRAL DEFAULTS. Each real category lives under
# `sectors` and overrides only what differs for it. Pick one with --sector (or the
# `active_sector` default). Run `python targets.py --sector cameras-lenses ...`.

category: "graded-sports-cards"

# How a freeform listing title is turned into a comparable identity.
#   card   = grader + grade parsed strictly, player/set tokens required (slabs).
#   camera = exact body/lens model via src/valbot/camera.py; resolve-or-skip.
# Neutral default is card; the cameras sector overrides it. Drives the live sources
# and the mock/targets paths, so one switch moves the whole lane.
identity: "card"

# Which sector profile to use when --sector isn't passed.
active_sector: "graded-cards"

# ---- Valuation (ADR-001, build handoff) -------------------------------------
valuation:
  # Seed by hand from a few real sold-vs-asking observations; refine from outcomes.
  # 0.85 = sold prices land ~15% under asking on average. Per category.
  sold_to_asking_ratio: 0.85
  spread_method: "mad" # "mad" or "iqr"
  k: 1.0 # conservative_value = point_value - k * dispersion
  # confidence shaping
  n_full_confidence: 15 # comp count at which the n-factor saturates to 1.0
  rel_dispersion_zero_conf: 0.50 # rel dispersion at which the spread-factor hits 0
  confidence_high: 0.66
  confidence_medium: 0.33

# ---- Confidence gate (ADR-008) ----------------------------------------------
gate:
  min_comps: 8
  max_rel_dispersion: 0.35 # drop scattered comps (spread / point_value)

# ---- Fees, all-in conservative (ADR-005) ------------------------------------
# Itemised on purpose: you can see which cost eats the margin and swap a single
# rate when eBay changes it, without touching the logic.
fees:
  # Your selling account type. UK private sellers pay £0 final value fees (since
  # Oct 2024) — that's you today, so it's the default. Switch to "business" if eBay
  # or HMRC reclassify you once resale volume looks like trading.
  seller_type: "private" # "private" or "business"
  # Sell-side rates below ONLY apply when seller_type is "business".
  sell_fvf_pct: 0.128 # 12.8% final value fee
  sell_fixed: 0.40 # per-order fixed fee (orders > £10, from Feb 2026)
  sell_regulatory_pct: 0.0035 # 0.35% regulatory operating fee
  vat_on_fees_pct: 0.20 # 20% VAT on eBay fees; set 0 if VAT-registered (reclaimable)
  # Buy side — buyer-protection fee, tiered, charged on the purchase.
  # Conservative: assumed to apply. Set apply_buyer_protection false to drop it.
  apply_buyer_protection: true
  buyer_protection_tiers: # [upper_bound_gbp, rate]; last tier applies above prior bound
    - [20, 0.07]
    - [300, 0.04]
    - [4000, 0.02]
  buyer_protection_fixed: 0.10
  # Postage both ways, flat estimates for a slab (tracked, small parcel).
  postage_in: 3.50
  postage_out: 3.50

# ---- Floors and ranking (ADR-004) -------------------------------------------
thresholds:
  margin_floor: 0.25 # expected_profit / conservative_value
  profit_floor: 15.0 # GBP absolute
  price_cap: 50.0 # v1 risk control on item price, NOT a ranking input

# ---- Data source ------------------------------------------------------------
# Default route: third-party RapidAPI (no eBay developer account, real sold comps).
# Field paths below differ by provider — confirm them once against your provider's
# sample response. The official Browse API stays available as a free fallback
# (run.py --mode browse). See README "Where the data comes from".
thirdparty:
  # Default auth (RapidAPI) — used by any endpoint that doesn't set its own `auth`.
  api_host: "real-time-ebay-data1.p.rapidapi.com"
  auth: {scheme: "rapidapi", secret: "RAPIDAPI_KEY"}

  # LIVE: active auctions ending soon -> targets to bid on.
  # OpenWeb Ninja "Real-Time eBay Data" via RapidAPI. Field paths from their published
  # sample; confirm against a real response at first `thirdparty` smoke test. Querying
  # ebay.co.uk -> prices already in GBP.
  live:
    url: "https://real-time-ebay-data1.p.rapidapi.com/search"
    query_param: "query"
    extra_params: {country: "gb", buying_format: "auction", sort_by: "ending_soonest"}
    items_path: "data"
    fields: {title: "title", price: "price", id: "item_id", url: "url", ends_at: "time_left"}
    currency: "GBP"

  # SOLD: real sold prices -> comps to value against.
  # The Card API (thecardapi.com) — trading-card native, true sold prices incl. accepted
  # Best Offer. Own key via x-market-api-key header. Prices are USD -> converted to GBP
  # at ingestion using fx.usd_to_gbp. Confirmed against their published response schema.
  sold:
    url: "https://thecardapi.com/api/v1/market/sales"
    auth: {scheme: "header", header: "x-market-api-key", secret: "CARDAPI_KEY"}
    query_param: "q"
    extra_params: {limit: 200, sort: "date_desc"}
    items_path: "data"
    fields: {title: "title", price: "price", id: "id", url: "listing_url"}
    currency: "USD"

# ---- FX ---------------------------------------------------------------------
# The Card API returns USD; the bot reasons in GBP. Placeholder rate — calibrate from
# outcomes, or wire a live rate later. Caveat: US sold comps are not the same as UK
# resale value. Watch this in the read-only week before trusting the conversion.
fx:
  usd_to_gbp: 0.79

# ---- Poll / search (ADR-006) ------------------------------------------------
search:
  ending_within_hours: 6 # only value auctions ending in this window
  marketplace: "EBAY_GB"
  max_results_per_query: 50
  # Search terms that seed the target auctions to value. Tune freely.
  queries:
    - "PSA 10 panini prizm"
    - "BGS 9.5 topps chrome"
    - "PSA 9 football card"

# ---- Alerting (ADR-007) -----------------------------------------------------
alert:
  max_per_run: 10 # don't spam if a flood passes the gate
  dedupe: true # skip listings already alerted (state file)

# ---- Sector profiles --------------------------------------------------------
# Each sector overrides only what differs from the neutral defaults above. Switch
# with --sector. The corrected, real-world assumptions live HERE, not in the base
# blocks (the base stays neutral so the test fixtures keep working).
#
# Two assumptions were wrong in v1 and are fixed in these profiles:
#   1. seller_type was "private" (£0 fees). Buying to resell with a third-party tool
#      is business activity, and eBay only lets BUSINESS sellers use such tools — so
#      every sector models business fees. (Research, 17 Jun 2026.)
#   2. sold_to_asking_ratio was 0.85, which suits ASKING-price comps. Our comps are
#      real SOLD prices, so the ratio sits near 1.0. Calibrate from outcomes.
# FVF rates below are category-specific starting points — CONFIRM each against eBay
# UK's live business-seller calculator before trusting the max bid.
sectors:
  graded-cards:
    label: "Graded sports / TCG cards"
    overrides:
      category: "graded-sports-cards"
      valuation:
        sold_to_asking_ratio: 1.0 # Card API returns sold prices, not asking
      fees:
        seller_type: "business"
        sell_fvf_pct: 0.109 # UK collectables/cards ~10.9% (confirm)
      fx:
        usd_to_gbp: 0.79 # Card API is USD. CAVEAT: US sold != UK resale. Prefer GBP comps.
      search:
        queries:
          - "PSA 10 panini prizm"
          - "BGS 9.5 topps chrome"
          - "PSA 9 football card"

  cameras-lenses:
    label: "Exact-model cameras & lenses (UK only)"
    overrides:
      category: "cameras-lenses"
      identity: "camera" # exact body/lens model, not grader+grade
      valuation:
        sold_to_asking_ratio: 1.0 # real SOLD prices via the findCompletedItems feed (no asking-price proxy)
        # Only drop toward ~0.85 if you fall back to Browse ACTIVE listings (--mode browse,
        # ADR-011): UK used gear clears under median asking. The thirdparty sold feed below
        # returns true sold prices, so the ratio sits at 1.0.
        comp_min_price: {body: 80.0, lens: 25.0} # backstop: accessories that slip past category filter
      fees:
        seller_type: "business"
        sell_fvf_pct: 0.069 # UK cameras/lenses ~6.9% (confirm)
      fx:
        usd_to_gbp: 1.0 # UK GBP comps only — no USD conversion, no US sourcing
      thresholds:
        price_cap: 250.0 # learning mode: lower risk, more volume; raise once niches confirmed
        profit_floor: 20.0 # learning mode: see more deals, collect data; tighten from outcomes
      search:
        ending_within_hours: 24
        require_buy_it_now: true  # only surface auctions that ALSO offer Buy It Now
                                  # (a known price you can snap if it's under your max bid)
        category_ids: {body: "31388", lens: "3323"}  # Browse API allows 1 ID per request
                                                      # 31388 Digital Cameras, 3323 Camera Lenses leaf
                                                      # NOT 78997 (Lenses & Filters parent — includes hoods)
        queries:
          # Tier-down niches: auction prices scattered, BIN ceiling £280-380, fits £250 cap
          # Ranked by deal frequency + auction scatter (research/niche-cameras-tier-down.md)
          - "Sony A6000 body"        # £90-200 auction, £320-380 BIN, 40-60 auctions/wk
          - "Canon EOS 6D body"      # £120-230 auction, £280-340 BIN, 20-35/wk
          - "Sony A7 II body"        # £160-280 auction, £320-380 BIN, 20-30/wk
          - "Nikon D610 body"        # £140-240 auction, £280-360 BIN, 15-25/wk (recall stigma)
          - "Fujifilm X-T30 body"    # £150-280 auction, £320-380 BIN, 15-25/wk
      # SOLD-COMP SOURCE — real UK sold prices via RapidAPI (ADR-011 gap now closed).
      # Provider: "eBay Average Selling Price" (ebay-average-selling-price.p.rapidapi.com,
      # colindaniels/caffeindev). POST /findCompletedItems returns true completed-sale
      # prices plus aggregate stats (average/median/min/max) per query. One RAPIDAPI_KEY,
      # same secret the live feed uses. site_id 3 = ebay.co.uk (GBP), so no FX conversion.
      # Marketplace Insights stays partner-gated; this is the working substitute.
      thirdparty:
        sold:
          url: "https://ebay-average-selling-price.p.rapidapi.com/findCompletedItems"
          method: "POST"  # search term + filters ride in a JSON body, not GET params
          host: "ebay-average-selling-price.p.rapidapi.com"  # per-endpoint RapidAPI host
          auth: {scheme: "rapidapi", secret: "RAPIDAPI_KEY"}
          query_param: "keywords"
          # site_id 3 = UK/GBP. remove_outliers false keeps the real distribution so the
          # bot's own dispersion gate (not the provider) decides what's too scattered.
          extra_params: {site_id: "3", max_search_results: 60, remove_outliers: false}
          items_path: "products"
          fields: {title: "title", price: "sale_price", id: "item_id", url: "link", condition: "condition", buying_format: "buying_format"}
          currency: "GBP"
          # Clean the comps client-side (0 extra pulls — applied to cached raw items too):
          # drop new/parts conditions and multi-item bundles so the distribution reflects
          # genuine used single bodies. Substring match, case-insensitive.
          # NOTE: exclude keywords suit BODY niches; revisit if lens niches are added.
          exclude_conditions: ["new", "parts", "spares", "faulty", "not working"]
          # Bundle-specific phrasing only — NOT bare "lens" (that would wrongly drop
          # legit "body only, no lens" listings). Bundles with an explicit focal length
          # (e.g. "16-50mm") are already excluded upstream: the parser reads a focal as a
          # LENS identity, so it never matches a body niche.
          exclude_title_keywords: ["bundle", "lenses", "with lens", "+ lens", "and lens", "zoom", "kit", "grip", "joblot", "job lot", "twin"]
          # Budget guard (see CLAUDE.md). Sold medians are near-stationary, so cache each
          # model's response for ~a month: a re-run then costs 0 pulls. The monthly ledger
          # refuses live pulls once 50 are spent — 1 pull/model/month => up to 50 models.
          cache_days: 30
          monthly_pull_budget: 50
