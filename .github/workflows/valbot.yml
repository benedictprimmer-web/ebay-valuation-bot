name: valbot

# Read-only valuation + alert. Polls eBay, fires WhatsApp alerts. Never bids (ADR-002).
on:
  schedule:
    - cron: "*/20 * * * *" # every 20 min (ADR-006). Actions cron can drift a few min — fine.
  workflow_dispatch: # manual run button
    inputs:
      mode:
        description: "mock, thirdparty, or browse"
        default: "thirdparty"

permissions:
  contents: write # to commit updated alert state / outcome log back to the repo

concurrency:
  group: valbot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run valuation bot
        env:
          CARDAPI_KEY: ${{ secrets.CARDAPI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python run.py --mode "${{ github.event.inputs.mode || 'thirdparty' }}"

      - name: Commit updated state
        run: |
          git config user.name "valbot"
          git config user.email "valbot@users.noreply.github.com"
          git add data/state/alerted.json data/outcomes.json || true
          git diff --staged --quiet || git commit -m "valbot: update alert state [skip ci]"
          git push || true
